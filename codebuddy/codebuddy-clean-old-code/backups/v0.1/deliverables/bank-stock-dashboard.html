let currentStock = 0;
let charts = {};

function switchStock(idx) {
  currentStock = idx;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  renderAll();
}

function renderAll() {
  const s = DATA.stocks[currentStock];
  renderInfoCards(s);
  renderPriceChart(s);
  renderMonthlyChart(s);
  renderSeasonal(s);
  renderDividends(s);
  renderPredictions(s);
}

function renderInfoCards(s) {
  const last = s.kline[s.kline.length-1];
  const price = last[4];
  const mv = (price * s.shares).toLocaleString('zh-CN', {maximumFractionDigits:0});
  const ytdPct = s.monthly_pct[Object.keys(s.monthly_pct).slice(-1)[0]] || 0;
  const allCloses = s.kline.filter(k=>k[4]).map(k=>k[4]);
  const high52w = Math.max(...allCloses.slice(-12));
  const low52w = Math.min(...allCloses.slice(-12));

  const divTotal = s.dividends.filter(d=>!d.date.includes('待定')).reduce((a,d)=>a+d.amount,0);
  const divIncome = (divTotal * s.shares).toLocaleString('zh-CN', {maximumFractionDigits:0});

  document.getElementById('infoCards').innerHTML = `
    <div class="card"><div class="label">当前价格</div><div class="value ${price>0?'neutral':''}">${price.toFixed(2)}</div></div>
    <div class="card"><div class="label">持仓市值</div><div class="value">${mv}元</div></div>
    <div class="card"><div class="label">52周最高/最低</div><div class="value" style="font-size:16px">${high52w.toFixed(2)} / ${low52w.toFixed(2)}</div></div>
    <div class="card"><div class="label">3年累计分红收入</div><div class="value up">${divIncome}元</div></div>
  `;
}

function renderPriceChart(s) {
  const ctx = document.getElementById('priceChart').getContext('2d');
  if (charts.price) charts.price.destroy();

  const closes = s.kline.filter(k=>k[4]!=null).map(k=>({x:k[0],y:k[4]}));
  const highs = s.kline.filter(k=>k[4]!=null).map(k=>({x:k[0],y:k[2]}));
  const lows = s.kline.filter(k=>k[4]!=null).map(k=>({x:k[0],y:k[3]}));

  // SMA20 / SMA60
  const closeArr = closes.map(c=>c.y);
  const sma20 = closeArr.map((v,i,a) => {
    if (i<19) return null;
    const slice = a.slice(i-19, i+1);
    return {x: closes[i].x, y: slice.reduce((a,b)=>a+b,0)/20};
  }).filter(Boolean);
  const sma60 = closeArr.map((v,i,a) => {
    if (i<59) return null;
    const slice = a.slice(i-59, i+1);
    return {x: closes[i].x, y: slice.reduce((a,b)=>a+b,0)/60};
  }).filter(Boolean);

  // 分红标记点
  const divPoints = s.dividends.filter(d=>!d.date.includes('待定')).map(d => {
    const matching = closes.find(c => c.x === d.date);
    return matching ? {x:d.date, y:matching.y} : null;
  }).filter(Boolean);

  charts.price = new Chart(ctx, {
    type: 'line',
    data: {
      datasets: [
        {label:'收盘价',data:closes,borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.05)',borderWidth:2,pointRadius:2,pointHoverRadius:5,tension:0.2,fill:true,order:1},
        {label:'SMA20',data:sma20,borderColor:'#fbbf24',borderWidth:1.5,pointRadius:0,tension:0.3,borderDash:[4,4],order:2},
        {label:'SMA60',data:sma60,borderColor:'#f87171',borderWidth:1.5,pointRadius:0,tension:0.3,borderDash:[4,4],order:3},
        {label:'分红',data:divPoints,borderColor:'#34d399',backgroundColor:'#34d399',pointRadius:8,pointStyle:'triangle',showLine:false,order:0},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{
        callbacks:{
          title:ctx=>ctx[0].raw.x,
          label:ctx=>{
            if(ctx.dataset.label==='分红') return '分红日';
            return ctx.dataset.label+': '+ctx.parsed.y.toFixed(2);
          }
        }
      }},
      scales:{
        x:{type:'category',ticks:{maxTicksLimit:12,maxRotation:45},grid:{color:'rgba(148,163,184,0.1)'}},
        y:{grid:{color:'rgba(148,163,184,0.1)'},ticks:{callback:v=>v.toFixed(1)+'元'}}
      }
    }
  });
}

function renderMonthlyChart(s) {
  const ctx = document.getElementById('monthlyChart').getContext('2d');
  if (charts.monthly) charts.monthly.destroy();

  const keys = Object.keys(s.monthly_pct).sort();
  const vals = keys.map(k=>s.monthly_pct[k]);
  const colors = vals.map(v=>v>=0?'rgba(52,211,153,0.7)':'rgba(248,113,113,0.7)');

  charts.monthly = new Chart(ctx, {
    type:'bar',
    data:{
      labels:keys.map(k=>k.substring(2)),
      datasets:[{label:'月度涨跌幅(%)',data:vals,backgroundColor:colors,borderColor:colors,borderWidth:0,borderRadius:3}]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{ticks:{maxRotation:45,font:{size:10}},grid:{display:false}},
        y:{grid:{color:'rgba(148,163,184,0.1)'},ticks:{callback:v=>v.toFixed(1)+'%'}}
      }
    }
  });
}

function renderSeasonal(s) {
  const grid = document.getElementById('seasonalGrid');
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  grid.innerHTML = months.map((m,i) => {
    const d = s.seasonal[i+1];
    if (!d) return '';
    const cls = d.avg >= 0 ? 'up' : 'down';
    return `<div class="season-item"><div class="month">${m}</div><div class="pct ${cls}">${d.avg>0?'+':''}${d.avg.toFixed(1)}%</div><div class="count">${d.count}年统计</div></div>`;
  }).join('');
}

function renderDividends(s) {
  const table = document.getElementById('divTable');
  let html = '<thead><tr><th>除权日</th><th>每股派息(元)</th><th>方案</th><th>持仓分红(元)</th></tr></thead><tbody>';
  s.dividends.forEach(d => {
    const income = (d.amount * s.shares).toFixed(2);
    html += `<tr><td>${d.date}</td><td>${d.amount.toFixed(3)}</td><td>${d.label}</td><td style="color:#34d399">${income}</td></tr>`;
  });
  html += '</tbody>';
  table.innerHTML = html;
}

function renderPredictions(s) {
  const grid = document.getElementById('predGrid');
  const pred = PREDICTIONS[currentStock];
  grid.innerHTML = pred.months.map((m,i) => {
    const change = ((pred.center[i] - s.kline[s.kline.length-1][4]) / s.kline[s.kline.length-1][4] * 100).toFixed(1);
    const cls = change >= 0 ? 'up' : '';
    return `<div class="season-item" style="background:#0f172a;border:1px solid #1e293b">
      <div class="month">${m}</div>
      <div class="center">${pred.center[i].toFixed(1)}</div>
      <div class="range">${pred.lo[i].toFixed(1)} - ${pred.hi[i].toFixed(1)}</div>
      <div style="font-size:11px;margin-top:4px;color:${change>=0?'#34d399':'#f87171'}">${change>=0?'+':''}${change}%</div>
    </div>`;
  }).join('');
}

// 初始化
renderAll();
</script>
</body>
</html>
